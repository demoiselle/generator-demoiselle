name: <%= project.lower %>_mobile
description: <%= project.lower %> mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  firebase_messaging: ^14.7.0
  file_picker: ^6.1.0
  image_picker: ^1.0.0
  share_plus: ^7.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
