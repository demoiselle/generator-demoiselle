# =============================================================================
# Demoiselle 4.1 — Arquivo de Configuração
# =============================================================================
# Todas as propriedades estão comentadas com seus valores padrão.
# Descomente e altere conforme necessário para o seu ambiente.
#
# Este arquivo é lido automaticamente pelo módulo demoiselle-configuration.
# Prefixo padrão: "demoiselle". Formato: demoiselle.<módulo>.<propriedade>=valor
# =============================================================================


# =============================================================================
# CRUD (demoiselle-crud)
# =============================================================================

# Habilita os patterns de CRUD automático (filtros, paginação, ordenação via query string).
# demoiselle.crud.patternsEnabled=false


# -----------------------------------------------------------------------------
# Paginação
# -----------------------------------------------------------------------------

# Habilita paginação globalmente em todos os endpoints CRUD.
# demoiselle.crud.pagination.isGlobalEnabled=true

# Número padrão de registros por página quando não especificado na requisição.
# demoiselle.crud.pagination.defaultPagination=20


# -----------------------------------------------------------------------------
# Operações em Batch
# -----------------------------------------------------------------------------

# Tamanho do lote para operações batch (persistAll, removeAll, updateAll).
# O EntityManager faz flush/clear a cada N registros para evitar estouro de memória.
# demoiselle.crud.batch.size=50


# =============================================================================
# SEGURANÇA (demoiselle-security)
# =============================================================================

# -----------------------------------------------------------------------------
# CORS (Cross-Origin Resource Sharing)
# -----------------------------------------------------------------------------

# Habilita o suporte a CORS para permitir requisições de origens diferentes.
# demoiselle.security.corsEnabled=true

# Tempo máximo (em segundos) que o navegador pode cachear a resposta preflight.
# demoiselle.security.corsMaxAge=3600

# Headers CORS — controlam quais origens, métodos e headers são permitidos.
# Formato: mapa chave=valor. Cada header é enviado na resposta preflight.
# demoiselle.security.paramsHeaderCors.Access-Control-Allow-Headers=origin, content-type, accept, Authorization, Content-Range
# demoiselle.security.paramsHeaderCors.Access-Control-Allow-Credentials=true
# demoiselle.security.paramsHeaderCors.Access-Control-Allow-Origin=*
# demoiselle.security.paramsHeaderCors.Access-Control-Allow-Methods=HEAD, OPTIONS, TRACE, GET, POST, PUT, PATCH, DELETE
# demoiselle.security.paramsHeaderCors.Access-Control-Max-Age=86400


# -----------------------------------------------------------------------------
# Proteção contra Brute Force
# -----------------------------------------------------------------------------

# Número máximo de tentativas de login falhas antes do bloqueio por IP.
# demoiselle.security.bruteForceMaxAttempts=5

# Duração do bloqueio em segundos após exceder o limite de tentativas.
# demoiselle.security.bruteForceLockoutDuration=300


# -----------------------------------------------------------------------------
# Headers de Segurança HTTP
# -----------------------------------------------------------------------------

# Previne que o navegador interprete o MIME type de forma diferente do declarado.
# Ref: https://scotthelme.co.uk/hardening-your-http-response-headers/#x-content-type-options
# demoiselle.security.paramsHeaderSecuriry.x-content-type-options=nosniff

# Controla se a página pode ser exibida em um iframe.
# Valores: DENY, SAMEORIGIN, ALLOW-FROM uri
# Ref: https://scotthelme.co.uk/hardening-your-http-response-headers/#x-frame-options
# demoiselle.security.paramsHeaderSecuriry.x-frame-options=SAMEORIGIN

# Ativa o filtro XSS do navegador e bloqueia a página se um ataque for detectado.
# Ref: https://scotthelme.co.uk/hardening-your-http-response-headers/#x-xss-protection
# demoiselle.security.paramsHeaderSecuriry.x-xss-protection=1; mode=block

# Força o uso de HTTPS por um período definido (em segundos). 31536000 = 1 ano.
# Ref: https://scotthelme.co.uk/hsts-the-missing-link-in-tls/
# demoiselle.security.paramsHeaderSecuriry.Strict-Transport-Security=strict-transport-security: max-age=31536000; includeSubDomains

# Política de segurança de conteúdo (CSP) para prevenir XSS e injeção de dados.
# Ref: https://scotthelme.co.uk/content-security-policy-an-introduction/
# demoiselle.security.paramsHeaderSecuriry.Content-Security-Policy=script-src 'self'

# Pinagem de chave pública HTTP (HPKP) — desabilitado por padrão.
# Ref: https://scotthelme.co.uk/hpkp-http-public-key-pinning/
# demoiselle.security.paramsHeaderSecuriry.Public-Key-Pins=

# Headers expostos ao frontend via CORS (necessário para paginação via Content-Range).
# demoiselle.security.paramsHeaderSecuriry.Access-Control-Expose-Headers=Content-Range


# =============================================================================
# JWT — JSON Web Token (demoiselle-security-jwt)
# =============================================================================

# Tipo de token: "master" (gera e valida com par de chaves RSA) ou "slave" (apenas valida com chave pública).
# demoiselle.security.jwt.type=master

# Tempo de vida do access token em milissegundos. Padrão: 1 hora.
# demoiselle.security.jwt.timetoLiveMilliseconds=3600000

# Tempo de vida do refresh token em milissegundos. Padrão: 24 horas.
# demoiselle.security.jwt.refreshTokenTtlMilliseconds=86400000

# Emissor (issuer) do token — identifica quem gerou o token.
# demoiselle.security.jwt.issuer=<%= project.capital %>

# Audiência (audience) do token — identifica para quem o token é destinado.
# demoiselle.security.jwt.audience=web

# Algoritmo de assinatura principal (ex.: RS256, RS384, RS512, ES256).
# demoiselle.security.jwt.algorithmIdentifiers=RS256

# Algoritmos permitidos para validação (separados por vírgula).
# Permite aceitar tokens assinados com algoritmos diferentes durante rotação de chaves.
# demoiselle.security.jwt.allowedAlgorithms=RS256

# Tolerância de clock skew em segundos para validação de expiração.
# Compensa diferenças de relógio entre servidores.
# demoiselle.security.jwt.clockSkewSeconds=60

# ID da chave ativa para rotação de chaves (kid header no JWT).
# Quando configurado, o framework inclui o kid no header do token gerado.
# demoiselle.security.jwt.activeKeyId=

# Chave privada RSA para assinatura JWT (formato PEM, sem quebras de linha).
# IMPORTANTE: Gere suas próprias chaves para produção!
# Gerar com: openssl genpkey -algorithm RSA -out private.pem -pkeyopt rsa_keygen_bits:2048
# demoiselle.security.jwt.privateKey=-----BEGIN PRIVATE KEY-----SUA_CHAVE_PRIVADA_AQUI-----END PRIVATE KEY-----

# Chave pública RSA para validação JWT (formato PEM, sem quebras de linha).
# Extrair da privada: openssl rsa -pubout -in private.pem -out public.pem
# demoiselle.security.jwt.publicKey=-----BEGIN PUBLIC KEY-----SUA_CHAVE_PUBLICA_AQUI-----END PUBLIC KEY-----


# =============================================================================
# HashCash — Proof-of-Work (demoiselle-security-hashcash)
# =============================================================================

# Chave secreta para geração/validação de tokens HashCash.
# demoiselle.security.hashcash.hashcashKey=

# Tempo de vida do token HashCash em milissegundos.
# demoiselle.security.hashcash.timetoLiveMilliseconds=60000


# =============================================================================
# REST (demoiselle-rest)
# =============================================================================

# Exibir detalhes de erros nas respostas REST (desabilitar em produção).
# demoiselle.rest.showErrorDetails=true

# Formato de erros REST:
#   "legacy"  — formato Demoiselle clássico (array de mensagens)
#   "rfc9457" — Problem Details (RFC 9457: type, title, status, detail, instance)
# demoiselle.rest.errorFormat=legacy

# Mapeamento de erros SQL para mensagens amigáveis.
# Formato: demoiselle.rest.sqlError.<constraint-name>=Mensagem amigável
# Exemplo:
# demoiselle.rest.sqlError.uk_user_email=Já existe um usuário com este email


# =============================================================================
# OpenAPI (demoiselle-openapi)
# =============================================================================

# Habilita a geração automática de documentação OpenAPI via MicroProfile.
# demoiselle.openapi.enabled=true


# =============================================================================
# MCP — Model Context Protocol (demoiselle-mcp)
# =============================================================================

# Nome do servidor MCP exposto aos clientes de IA.
# demoiselle.mcp.serverName=demoiselle-mcp

# Versão do servidor MCP.
# demoiselle.mcp.serverVersion=1.0.0

# Transporte MCP: "sse" (Server-Sent Events via HTTP) ou "stdio" (stdin/stdout local).
# demoiselle.mcp.transport=sse

# Habilita validação JWT nas requisições MCP.
# demoiselle.mcp.securityEnabled=false

# Lista de ferramentas MCP desabilitadas (separadas por vírgula).
# demoiselle.mcp.toolsDisabled=


# =============================================================================
# Upload de Arquivos (configuração da aplicação)
# =============================================================================

# Diretório de armazenamento dos arquivos enviados.
# app.file.storage.directory=uploads

# Tamanho máximo de upload em bytes. Padrão: 10 MB.
# Retorna HTTP 413 (Payload Too Large) quando excedido.
# app.file.max-size=10485760

# Tipos MIME permitidos para upload (separados por vírgula).
# Retorna HTTP 415 (Unsupported Media Type) para tipos não listados.
# app.file.allowed-mime-types=image/png,image/jpeg,image/gif,application/pdf,text/plain


# =============================================================================
# Email (Jakarta Mail)
# =============================================================================

# O envio de email utiliza Jakarta Mail via recurso JNDI do servidor de aplicação.
#
# Recurso JNDI padrão: java:jboss/mail/Default
#
# Configuração WildFly (standalone.xml):
#   <mail-session name="default" jndi-name="java:jboss/mail/Default">
#     <smtp-server outbound-socket-binding-ref="mail-smtp">
#       <login name="seu-email@gmail.com" password="sua-senha-de-app"/>
#     </smtp-server>
#   </mail-session>
#
# Remetente padrão: noreply@<%= project.lower %>.com
# URL base para links: http://localhost:8080/<%= project.lower %>/api/v1


# =============================================================================
# Banco de Dados (persistence.xml)
# =============================================================================

# Configurações de banco ficam em src/main/resources/META-INF/persistence.xml.
# Propriedades Hibernate comuns:
#
#   hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#   hibernate.hbm2ddl.auto=update
#   hibernate.show_sql=true
#   hibernate.format_sql=true
